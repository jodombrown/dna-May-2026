name: design-system-gate

on:
  pull_request:
    branches: [main]

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Gate changed files
        shell: bash
        run: |
          # GitHub's `shell: bash` injects -e, but this script manages rg
          # exit codes itself (rc 1 = clean pass, handled explicitly). Under
          # -e the first check that finds NO violations aborts the job, so
          # the gate could never pass on a PR with changed src files.
          set +e
          set -uo pipefail

          BASE_REF="${{ github.base_ref }}"
          git fetch --no-tags origin "$BASE_REF"
          BASE="origin/$BASE_REF"

          mapfile -t FILES < <(
            git diff --name-only --diff-filter=d "$BASE"...HEAD -- src \
              | grep -E '\.(ts|tsx)$' || true
          )

          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "No changed src TS files. Gate passes trivially."
            exit 0
          fi

          echo "Gating ${#FILES[@]} changed file(s):"
          printf '  %s\n' "${FILES[@]}"
          FAILED=0

          # rc 0 = matches found (FAIL). rc 1 = ran, none found (PASS).
          # rc >1 = errored. An errored guard is a FAILED guard, never a pass.
          check () {
            local label="$1"; shift
            local pattern="$1"; shift
            local out rc
            out="$(rg -n --no-heading -e "$pattern" "${FILES[@]}")"
            rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "::error::${label}"
              echo "$out"
              FAILED=1
            elif [ "$rc" -gt 1 ]; then
              echo "::error::rg errored (exit $rc) on check: ${label}. Failing closed."
              FAILED=1
            fi
          }

          check "Hex color literal. Use a semantic token." \
                '#[0-9a-fA-F]{3,8}\b'

          check "Banned Tailwind default font size. Use the DNA scale: micro meta body h3 h2 h1 display hero." \
                '\btext-(xs|sm|base|lg|xl|2xl|3xl|4xl|5xl|6xl|7xl|8xl|9xl)\b'

          check "Legacy font alias. Use font-display or font-body." \
                '\bfont-(sans|ui|serif|heritage)\b'

          # Arbitrary values. Two-step so we can allow the hsl(var(--x)) escape
          # without needing PCRE lookaheads.
          ARB='\b(text|bg|p|px|py|pt|pb|pl|pr|m|mx|my|mt|mb|ml|mr|w|h|min-w|min-h|max-w|max-h|gap|top|left|right|bottom|rounded|border|leading|tracking)-\['
          raw="$(rg -n --no-heading -e "$ARB" "${FILES[@]}")"
          rc=$?
          if [ "$rc" -gt 1 ]; then
            echo "::error::rg errored (exit $rc) on arbitrary-value check. Failing closed."
            FAILED=1
          elif [ "$rc" -eq 0 ]; then
            filtered="$(printf '%s\n' "$raw" | grep -v 'hsl(var(' || true)"
            if [ -n "$filtered" ]; then
              echo "::error::Arbitrary Tailwind value. Only bg-[hsl(var(--token))] is permitted."
              echo "$filtered"
              FAILED=1
            fi
          fi

          # Page-level layout values, only under src/pages
          mapfile -t PAGES < <(printf '%s\n' "${FILES[@]}" | grep '^src/pages/' || true)
          if [ "${#PAGES[@]}" -gt 0 ]; then
            out="$(rg -n --no-heading -e '\b(max-w-|container|px-|py-|mt-|mb-)' "${PAGES[@]}")"
            rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "::error::Page-level layout value. Section owns rhythm, Container owns width."
              echo "$out"
              FAILED=1
            elif [ "$rc" -gt 1 ]; then
              echo "::error::rg errored (exit $rc) on page-layout check. Failing closed."
              FAILED=1
            fi
          fi

          if [ "$FAILED" -eq 1 ]; then
            echo "Design system gate FAILED."
            exit 1
          fi
          echo "Design system gate passed."

  sw-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: sw.js changed implies CACHE_VERSION bumped
        shell: bash
        run: |
          set -uo pipefail

          BASE_REF="${{ github.base_ref }}"
          git fetch --no-tags origin "$BASE_REF"
          BASE="origin/$BASE_REF"

          if git diff --quiet "$BASE"...HEAD -- public/sw.js; then
            echo "public/sw.js unchanged. Gate passes."
            exit 0
          fi

          OLD="$(git show "$BASE":public/sw.js | grep -oE 'CACHE_VERSION *= *[0-9]+' | grep -oE '[0-9]+' || true)"
          NEW="$(grep -oE 'CACHE_VERSION *= *[0-9]+' public/sw.js | grep -oE '[0-9]+' || true)"

          echo "public/sw.js changed. CACHE_VERSION old='$OLD' new='$NEW'"

          if [ -z "$OLD" ] || [ -z "$NEW" ]; then
            echo "::error::Could not read CACHE_VERSION on one or both sides. Failing closed."
            exit 1
          fi

          if [ "$NEW" -le "$OLD" ]; then
            echo "::error::public/sw.js changed but CACHE_VERSION was not incremented. Returning users will serve stale assets from cache and never see this release."
            exit 1
          fi

          echo "sw version gate passed."
