name: Check External Links

# Validates that every http(s) URL referenced from src/, index.html and
# public/llms.txt is still reachable. Runs on PRs, on pushes to main,
# and nightly (so link rot is caught even without new commits).

on:
  pull_request:
    paths:
      - 'src/**'
      - 'index.html'
      - 'public/llms.txt'
      - 'scripts/check-external-links.ts'
      - '.github/workflows/check-links.yml'
  push:
    branches: [main]
  schedule:
    # 06:00 UTC daily
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Validate external links
        run: npm run lint:links
