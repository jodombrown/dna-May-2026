name: Lint Icons

on:
  pull_request:
    paths:
      - 'src/**/*.tsx'
      - 'src/**/*.ts'
      - 'scripts/check-icon-duplicates.ts'
      - 'docs/ICON_USAGE_GUIDE.md'
      - '.github/workflows/lint-icons.yml'
  push:
    branches: [main]

jobs:
  lint-icons:
    name: Check duplicate navigation icons
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run icon duplication check
        run: npm run lint:icons
